<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>물리치료 시간계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F0F4FF;
      --card: #FFFFFF;
      --primary: #4A90D9;
      --primary-soft: #EBF3FF;
      --result: #1A5FA8;
      --text: #1E293B;
      --muted: #5B6B82;
      --shadow: 0 8px 24px rgba(30, 41, 59, 0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.6rem;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .base-time {
      margin: 0 0 16px;
      padding: 12px 14px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .base-time strong {
      color: var(--result);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      margin-left: 6px;
    }

    .items {
      display: grid;
      gap: 10px;
      margin: 0 0 18px;
    }

    .item-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 14px;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      transition: background-color 0.2s ease, transform 0.2s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .item-card:active {
      transform: scale(0.99);
    }

    .item-card input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }

    .check-ui {
      width: 26px;
      height: 26px;
      border: 2px solid #9FBFE5;
      border-radius: 8px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .check-ui::after {
      content: "";
      width: 12px;
      height: 7px;
      border-left: 3px solid #fff;
      border-bottom: 3px solid #fff;
      transform: rotate(-45deg) scale(0);
      transform-origin: center;
      transition: transform 0.2s ease;
      margin-top: -2px;
    }

    .item-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 8px;
    }

    .item-name {
      font-size: 1.02rem;
      font-weight: 700;
    }

    .item-minutes {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .item-card.is-checked {
      background: var(--primary-soft);
    }

    .item-card.is-checked .check-ui {
      border-color: var(--primary);
      background: var(--primary);
    }

    .item-card.is-checked .check-ui::after {
      transform: rotate(-45deg) scale(1);
    }

    .result-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .total {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .total strong {
      color: var(--result);
      margin-left: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-weight: 700;
    }

    .end-time-label {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    .end-time {
      margin: 4px 0 0;
      color: var(--result);
      font-size: clamp(2.5rem, 11vw, 3rem);
      line-height: 1;
      letter-spacing: -0.02em;
      font-weight: 800;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      transform-origin: left center;
    }

    .end-time.pulse {
      animation: pulseTime 0.26s ease;
    }

    @keyframes pulseTime {
      0% { transform: scale(1); }
      45% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 44px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
      filter: brightness(0.96);
    }

    .btn-reset {
      background: #DCE8F8;
      color: #294A73;
    }

    .btn-rebase {
      background: var(--primary);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>물리치료 시간계산기</h1>
    <p class="base-time">기준 시간 <strong id="baseTime">--:--</strong></p>

    <section class="items" aria-label="치료 항목 목록">
      <label class="item-card">
        <input type="checkbox" data-minutes="15" aria-label="A 항목 15분">
        <span class="check-ui" aria-hidden="true"></span>
        <span class="item-main">
          <span class="item-name">A</span>
          <span class="item-minutes">+15분</span>
        </span>
      </label>

      <label class="item-card">
        <input type="checkbox" data-minutes="15" aria-label="B 항목 15분">
        <span class="check-ui" aria-hidden="true"></span>
        <span class="item-main">
          <span class="item-name">B</span>
          <span class="item-minutes">+15분</span>
        </span>
      </label>

      <label class="item-card">
        <input type="checkbox" data-minutes="11" aria-label="C 항목 11분">
        <span class="check-ui" aria-hidden="true"></span>
        <span class="item-main">
          <span class="item-name">C</span>
          <span class="item-minutes">+11분</span>
        </span>
      </label>

      <label class="item-card">
        <input type="checkbox" data-minutes="5" aria-label="D 항목 5분">
        <span class="check-ui" aria-hidden="true"></span>
        <span class="item-main">
          <span class="item-name">D</span>
          <span class="item-minutes">+5분</span>
        </span>
      </label>

      <label class="item-card">
        <input type="checkbox" data-minutes="2" aria-label="F 항목 2분">
        <span class="check-ui" aria-hidden="true"></span>
        <span class="item-main">
          <span class="item-name">F</span>
          <span class="item-minutes">+2분</span>
        </span>
      </label>
    </section>

    <section class="result-box" aria-live="polite">
      <p class="total">총 추가 시간<strong id="totalMinutes">0분</strong></p>
      <div class="end-time-label">예상 종료 시간</div>
      <p class="end-time" id="endTime">--:--</p>
    </section>

    <section class="actions">
      <button class="btn-reset" id="resetBtn" type="button">초기화</button>
      <button class="btn-rebase" id="rebaseBtn" type="button">기준 시간 리셋</button>
    </section>
  </main>

  <script>
    const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"]'));
    const baseTimeEl = document.getElementById("baseTime");
    const totalMinutesEl = document.getElementById("totalMinutes");
    const endTimeEl = document.getElementById("endTime");
    const resetBtn = document.getElementById("resetBtn");
    const rebaseBtn = document.getElementById("rebaseBtn");

    let lastRenderedTime = "";

    function toHHMMSS(date) {
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return hh + ":" + mm + ":" + ss;
    }

    function getSelectedMinutes() {
      return checkboxes.reduce((sum, checkbox) => {
        if (!checkbox.checked) {
          return sum;
        }
        return sum + Number(checkbox.dataset.minutes || 0);
      }, 0);
    }

    function syncCheckedStyle() {
      checkboxes.forEach((checkbox) => {
        const card = checkbox.closest(".item-card");
        if (!card) {
          return;
        }
        card.classList.toggle("is-checked", checkbox.checked);
      });
    }

    function animateIfChanged(nextTime, shouldAnimate) {
      if (!shouldAnimate) {
        lastRenderedTime = nextTime;
        return;
      }
      if (nextTime === lastRenderedTime) {
        return;
      }
      lastRenderedTime = nextTime;
      endTimeEl.classList.remove("pulse");
      // Reflow for restarting keyframe animation.
      void endTimeEl.offsetWidth;
      endTimeEl.classList.add("pulse");
    }

    function render(shouldAnimate = false) {
      const baseTime = new Date();
      const totalMinutes = getSelectedMinutes();
      const expectedEnd = new Date(baseTime.getTime() + totalMinutes * 60000);
      const formattedBase = toHHMMSS(baseTime);
      const formattedEnd = toHHMMSS(expectedEnd);

      syncCheckedStyle();
      baseTimeEl.textContent = formattedBase;
      totalMinutesEl.textContent = totalMinutes + "분";
      endTimeEl.textContent = formattedEnd;
      animateIfChanged(formattedEnd, shouldAnimate);
    }

    function clearSelections() {
      checkboxes.forEach((checkbox) => {
        checkbox.checked = false;
      });
      render(true);
    }

    checkboxes.forEach((checkbox) => {
      checkbox.addEventListener("change", () => render(true));
    });

    resetBtn.addEventListener("click", clearSelections);

    rebaseBtn.addEventListener("click", () => {
      render(true);
    });

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
